<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="View and chat with your SpaceNotes.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SpaceNotes Client">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SpaceNotes Client</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="margin:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden">
  <div id="loading" style="text-align:center">
    <div style="width:40px;height:40px;border:3px solid #1a1a2e;border-top:3px solid #8b5cf6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto"></div>
    <div style="color:#6b7280;font-family:system-ui;font-size:13px;margin-top:16px">Loading SpaceNotes...</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script>
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
  </script>
  <script src="webcodecs_helper.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
